<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityVoice | Civic Issue Reporting Portal</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>🏙️ CityVoice</h1>

        <p class="subtitle">
            Ratnagiri Civic Issue Reporting Portal
        </p>

        <form id="reportForm">

            <div class="form-group">
                <label>Full Name</label>
                <input
                    type="text"
                    id="name"
                    placeholder="Enter your full name"
                    required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required>
            </div>

            <div class="form-group">
                <label>Location</label>
                <input
                    type="text"
                    id="location"
                    placeholder="Area / Locality"
                    required>
            </div>

            <div class="form-group">
                <label>Issue Category</label>

                <select id="issueType" required>

                    <option value="">Select Issue</option>

                    <option>Garbage Overflow</option>

                    <option>Water Leakage</option>

                    <option>Street Light Not Working</option>

                    <option>Road Damage / Potholes</option>

                    <option>Illegal Tree Cutting</option>

                    <option>Illegal Waste Burning</option>

                </select>

            </div>

            <div class="form-group">
                <label>Description</label>

                <textarea
                    id="description"
                    rows="5"
                    placeholder="Describe the issue..."
                    required></textarea>
            </div>

            <button type="submit" id="submitBtn">

                🚀 Submit Report

            </button>

        </form>

        <div id="statusMessage"></div>

    </div>

</div>

<footer>

    <p>

        🌱 Built for Sustainable Development Goals (SDG 6, 7, 11, 13 & 15)

    </p>

</footer>

<script src="script.js"></script>

</body>
</html>
